{% extends 'base.html' %}
{% block content %}
	<div class="bg-gray-100" x-data="{ openSidebar: false }">

  <!-- Mobile Header -->
  <div class="md:hidden flex items-center justify-between bg-white p-4 shadow">
    <h1 class="text-xl font-bold text-gray-800">My Dashboard</h1>
    <button @click="openSidebar = !openSidebar">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <div :class="openSidebar ? 'translate-x-0' : '-translate-x-full'"
         class="fixed z-40 inset-y-0 left-0 w-64 bg-white shadow-lg transform transition-transform duration-200 ease-in-out md:relative md:translate-x-0">
      <div class="flex flex-col justify-between h-full">
        <div>
          <!-- Judul -->
          <div class="p-6 border-b border-gray-200 hidden md:block">
            <h1 class="text-xl font-bold text-gray-800">My Dashboard</h1>
          </div>

          <!-- Menu Navigasi -->
          <nav class="mt-6 space-y-2 px-4">
            <a href="#" class="block py-2 px-4 rounded-lg hover:bg-blue-100 text-gray-700">Beranda</a>
            <a href="#" class="block py-2 px-4 rounded-lg hover:bg-blue-100 text-gray-700">Profil</a>
            <a href="#" class="block py-2 px-4 rounded-lg hover:bg-blue-100 text-gray-700">Laporan</a>
          </nav>
        </div>

        <!-- Tombol Logout -->
        <div class="p-4 border-t border-gray-200">
          <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="w-full py-2 px-4 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">Logout</button>
          </form>
        </div>
      </div>
    </div>

    <!-- Konten Utama -->
    <div class="flex-1 md:ml-64 p-6">
      <h2 class="text-2xl font-semibold mb-4">Selamat Datang, {{ request.user.username }}</h2>
      <p>Ini adalah konten utama dashboard.</p>
    </div>
  </div>

</div>
{% endblock %}
